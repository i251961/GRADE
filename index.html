<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Planejador de Graduação — Selecionar perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* =====================================================
     Paleta e variáveis — as mesmas do Planejador de Graduação,
     para que esta tela de seleção de perfil pareça parte do
     mesmo aplicativo (e não uma página à parte).
     ===================================================== */
  :root{
    --bg:            #10141a;
    --bg-grid-line:  rgba(130, 160, 200, 0.055);
    --bg-panel:      #171d26;
    --bg-panel-2:    #1c2330;
    --bg-card:       #1b212c;
    --bg-card-hover: #212836;
    --border:        #2a3140;
    --border-soft:   #232a37;

    --text-primary:  #e9edf3;
    --text-secondary:#8d97a8;
    --text-faint:    #5c6576;

    --accent-brass:  #c98a4a;
    --accent-brass-soft: rgba(201, 138, 74, 0.16);
    --accent-steel:  #5b8fc4;
    --accent-steel-soft: rgba(91, 143, 196, 0.16);

    --radius-card: 10px;
    --radius-panel: 14px;

    --font-display: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 18% 12%, rgba(91,143,196,0.08), transparent 55%),
      radial-gradient(circle at 85% 88%, rgba(201,138,74,0.07), transparent 50%),
      var(--bg);
    background-image:
      repeating-linear-gradient(to right, var(--bg-grid-line) 0, var(--bg-grid-line) 1px, transparent 1px, transparent 64px),
      repeating-linear-gradient(to bottom, var(--bg-grid-line) 0, var(--bg-grid-line) 1px, transparent 1px, transparent 64px),
      radial-gradient(circle at 18% 12%, rgba(91,143,196,0.08), transparent 55%),
      radial-gradient(circle at 85% 88%, rgba(201,138,74,0.07), transparent 50%);
    background-color: var(--bg);
    font-family: var(--font-display);
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ---------- cartão principal ---------- */

  .painel{
    width: 100%;
    max-width: 360px;
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-panel);
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    overflow: hidden;
  }

  .painel-topo{
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 22px 22px 18px;
    border-bottom: 1px solid var(--border-soft);
  }

  .brand-mark{
    color: var(--accent-brass);
    flex-shrink: 0;
    display: flex;
  }

  .brand-texto h1{
    margin: 0;
    font-size: 15.5px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .brand-texto p{
    margin: 3px 0 0;
    font-size: 12.5px;
    color: var(--text-secondary);
  }

  /* ---------- lista de perfis ---------- */

  .lista-perfis{
    list-style: none;
    margin: 0;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .perfil-link{
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    border-radius: var(--radius-card);
    text-decoration: none;
    color: var(--text-primary);
    background: transparent;
    border: 1px solid transparent;
    transition: background-color .15s ease, border-color .15s ease, transform .15s ease;
  }

  .perfil-link:hover,
  .perfil-link:focus-visible{
    background: var(--bg-card-hover);
    border-color: var(--border);
    transform: translateX(2px);
    outline: none;
  }

  .perfil-avatar{
    width: 34px;
    height: 34px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
    background: hsla(var(--cor-h), 55%, 45%, 0.20);
    border: 1px solid hsla(var(--cor-h), 55%, 55%, 0.45);
    color: hsl(var(--cor-h), 70%, 78%);
  }

  .perfil-texto{
    flex: 1;
    min-width: 0;
  }

  .perfil-nome{
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .perfil-legenda{
    display: block;
    font-size: 11.5px;
    color: var(--text-faint);
    font-family: var(--font-mono);
    margin-top: 1px;
  }

  .perfil-seta{
    color: var(--text-faint);
    flex-shrink: 0;
    transition: transform .15s ease, color .15s ease;
  }

  .perfil-link:hover .perfil-seta{
    color: var(--accent-brass);
    transform: translateX(2px);
  }

  /* ---------- rodapé ---------- */

  .painel-rodape{
    padding: 12px 22px 16px;
    border-top: 1px solid var(--border-soft);
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
    letter-spacing: .02em;
  }

  .painel-rodape strong{
    color: var(--text-secondary);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="painel">

  <div class="painel-topo">
    <div class="brand-mark" aria-hidden="true">
      <svg viewBox="0 0 40 40" width="30" height="30">
        <circle cx="20" cy="20" r="6.5" fill="none" stroke="currentColor" stroke-width="2.4"/>
        <g stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <line x1="20" y1="2" x2="20" y2="9"/>
          <line x1="20" y1="31" x2="20" y2="38"/>
          <line x1="2" y1="20" x2="9" y2="20"/>
          <line x1="31" y1="20" x2="38" y2="20"/>
          <line x1="7.5" y1="7.5" x2="12.5" y2="12.5"/>
          <line x1="27.5" y1="27.5" x2="32.5" y2="32.5"/>
          <line x1="32.5" y1="7.5" x2="27.5" y2="12.5"/>
          <line x1="12.5" y1="27.5" x2="7.5" y2="32.5"/>
        </g>
      </svg>
    </div>
    <div class="brand-texto">
      <h1>Planejador de Graduação</h1>
      <p>Selecione o seu perfil</p>
    </div>
  </div>

  <ul class="lista-perfis" id="lista-perfis">
    <!-- gerado via JS a partir de PERFIS, logo abaixo -->
  </ul>

  <div class="painel-rodape">
    <strong>UNICAMP</strong> · acesso pessoal
  </div>

</div>

<script>
  /* =====================================================
     Lista de perfis / contas.
     Para adicionar um novo perfil, basta incluir mais um
     objeto aqui — nome (o que aparece), curso (legenda menor)
     e url (para onde o link aponta). O avatar (iniciais + cor)
     é gerado automaticamente a partir do nome.
     ===================================================== */
  const PERFIS = [
    { nome: "ICARO", curso: "Engenharia Mecânica", url: "https://i251961.github.io/GRADE/ICARO" },
    { nome: "PAULA", curso: "Pedagogia (Integral)", url: "https://i251961.github.io/GRADE/PAULA" },
  ];

  function corPerfil(nome) {
    let hash = 0;
    for (let i = 0; i < nome.length; i++) {
      hash = (hash * 31 + nome.charCodeAt(i)) >>> 0;
    }
    return hash % 360;
  }

  function iniciais(nome) {
    return nome.trim().slice(0, 2).toUpperCase();
  }

  const listaEl = document.getElementById("lista-perfis");

  PERFIS.forEach((perfil) => {
    const li = document.createElement("li");

    const a = document.createElement("a");
    a.className = "perfil-link";
    a.href = perfil.url;

    const avatar = document.createElement("span");
    avatar.className = "perfil-avatar";
    avatar.style.setProperty("--cor-h", corPerfil(perfil.nome));
    avatar.textContent = iniciais(perfil.nome);
    avatar.setAttribute("aria-hidden", "true");

    const textos = document.createElement("span");
    textos.className = "perfil-texto";

    const nomeEl = document.createElement("span");
    nomeEl.className = "perfil-nome";
    nomeEl.textContent = perfil.nome;

    const legendaEl = document.createElement("span");
    legendaEl.className = "perfil-legenda";
    legendaEl.textContent = perfil.curso || "";

    textos.appendChild(nomeEl);
    if (perfil.curso) textos.appendChild(legendaEl);

    const seta = document.createElement("span");
    seta.className = "perfil-seta";
    seta.setAttribute("aria-hidden", "true");
    seta.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';

    a.appendChild(avatar);
    a.appendChild(textos);
    a.appendChild(seta);
    li.appendChild(a);
    listaEl.appendChild(li);
  });
</script>

</body>
</html>
